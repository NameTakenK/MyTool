<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyTool Notes</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>MyTool Notes</h1>
      <div class="actions">
        <input id="repoUrl" placeholder="https://github.com/owner/repo.git" />
        <button id="connectGithubBtn">Connect GitHub</button>
        <button id="openVaultBtn">Open Vault</button>
        <button id="newNoteBtn">New Note</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <strong>Vault</strong>
          <span id="vaultPath" class="muted">No vault selected</span>
          <span id="syncStatus" class="muted"></span>
        </div>
        <input id="searchInput" type="search" placeholder="Search notes..." />
        <div id="tree"></div>
      </aside>

      <section class="editor-pane">
        <div class="note-header">
          <strong id="currentNote">Select a note</strong>
          <button id="saveBtn">Save</button>
        </div>
        <div class="split">
          <textarea id="editor" spellcheck="false" placeholder="# Markdown"></textarea>
          <article id="preview" class="preview"></article>
        </div>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
