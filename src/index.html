<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyTool</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <h1>MyTool</h1>
        <p id="sidebarCaption" class="muted"></p>
        <button class="nav-btn active" data-panel="viewerPanel" id="navViewer"></button>
        <button class="nav-btn" data-panel="encodePanel" id="navEncode"></button>
        <button class="nav-btn" data-panel="syncPanel" id="navSync"></button>

        <div class="sidebar-bottom">
          <label for="languageSelect" id="languageLabel"></label>
          <select id="languageSelect">
            <option value="ko">한국어</option>
            <option value="en">English</option>
          </select>
          <button id="themeToggle"></button>
        </div>
      </aside>

      <main class="content">
        <section class="panel active" id="viewerPanel">
          <div class="panel-header">
            <h2 id="viewerTitle"></h2>
            <button id="openFileBtn"></button>
          </div>
          <p id="openedFilePath" class="muted"></p>

          <div class="viewer-stack">
            <article class="viewer-card">
              <h3 id="viewerDiffTitle"></h3>
              <div class="viewer-grid">
                <textarea id="diffInput" placeholder="diff text"></textarea>
                <pre id="diffOutput"></pre>
              </div>
            </article>

            <article class="viewer-card">
              <h3 id="viewerJsonTitle"></h3>
              <div class="viewer-grid">
                <textarea id="jsonInput" placeholder='{"hello":"world"}'></textarea>
                <pre id="jsonOutput"></pre>
              </div>
            </article>

            <article class="viewer-card">
              <h3 id="viewerMdTitle"></h3>
              <div class="viewer-grid">
                <textarea id="mdInput" placeholder="# markdown"></textarea>
                <div id="mdOutput" class="md-output"></div>
              </div>
            </article>
          </div>
        </section>

        <section class="panel" id="encodePanel">
          <h2 id="encodeTitle"></h2>
          <div class="toolbar">
            <label id="encodingLabel" for="encodingMode"></label>
            <select id="encodingMode">
              <option value="base64">Base64</option>
              <option value="url">URL Encoding</option>
            </select>
            <button id="encodeBtn"></button>
            <button id="decodeBtn"></button>
          </div>
          <div class="viewer-grid">
            <textarea id="encodeInput"></textarea>
            <textarea id="encodeOutput" readonly></textarea>
          </div>
        </section>

        <section class="panel" id="syncPanel">
          <h2 id="syncTitle"></h2>
          <div class="toolbar">
            <button id="addSyncBtn"></button>
            <button id="runSyncBtn"></button>
          </div>
          <div id="syncJobs"></div>
          <pre id="syncResult" class="sync-result"></pre>
        </section>
      </main>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
